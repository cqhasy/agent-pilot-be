<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 工作台</title>
    <link rel="stylesheet" href="./styles/base.css" />
</head>
<body>
<div class="app">
    <aside class="panel">
        <div class="sidebar-header">
            <h2>历史对话</h2>
            <button id="newSessionBtn" class="btn btn-secondary">+ 新会话</button>
        </div>
        <div class="sidebar-content">
            <div id="userCard" class="user-card hidden"></div>
            <div id="sessionList"></div>
        </div>
        <div class="sidebar-footer">
            <div class="account" id="account">
                <button id="feishuLoginBtn" class="btn btn-secondary account-btn full-width">飞书登录</button>
                <div id="accountMenu" class="account-menu hidden">
                    <div id="accountSummary" class="account-summary"></div>
                    <div class="account-menu-actions">
                        <button id="copyOpenIdBtn" class="btn btn-secondary">复制 OpenID</button>
                        <button id="logoutBtn" class="btn btn-secondary">退出</button>
                    </div>
                    <div class="account-menu-actions" style="margin-top:8px;">
                        <button id="reloginBtn" class="btn btn-primary">重新登录</button>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <main id="main" class="main">
        <section class="panel">
            <div class="chat-header">
                <h2>AI 助手</h2>
                <span id="workspaceTag" class="workspace-tag">当前模式：聊天</span>
            </div>
            <div id="chatTaskPanel" class="chat-task-panel hidden">
                <div class="chat-task-header">
                    <strong>任务拆解</strong>
                    <button id="toggleTaskBtn" class="btn btn-secondary btn-xs" type="button">收起</button>
                </div>
                <div id="chatTaskList" class="chat-task-list"></div>
            </div>
            <div id="chatLog" class="chat-log"></div>
            <div id="contextBox" class="context-box hidden"></div>
            <div class="chat-input-wrap">
                <textarea id="chatInput" placeholder="先从对话开始，AI 会自动识别你要做文档/PPT/其它任务"></textarea>
                <button id="sendBtn" class="btn btn-primary">发送</button>
            </div>
        </section>

        <section id="editorPanel" class="panel editor-panel">
            <div class="editor-header">
                <h3>文档协作区（按需显示）</h3>
                <div class="editor-actions">
                    <button id="rewriteSelectionBtn" class="btn btn-secondary">改写选中内容</button>
                    <button id="saveLarkBtn" class="btn btn-primary">保存到飞书文档</button>
                </div>
            </div>
            <div id="editor" contenteditable="true">当 AI 识别到文档任务时，这里会自动打开。</div>
        </section>
    </main>
</div>

<div id="selectionQuickAction" class="selection-quick-action hidden">
    <button id="markSelectionBtn" class="btn btn-secondary" type="button">✓ 加入改写</button>
</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
